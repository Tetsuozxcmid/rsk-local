# Прогон автотестов в контейнерах (Python 3.11/3.12 и Node 22).
# Не требует локального venv/npm подходящих версий.
#
# Один сервис:
#   docker compose -f docker-compose.tests.yml run --rm auth_tests
#
# Все подряд (PowerShell):
#   .\scripts\run-all-docker-tests.ps1
#
# Из каталога rsk_local (рядом с этим файлом).

services:
  auth_tests:
    build:
      context: ./RSK_back/auth_service
      dockerfile: dockerfile
    working_dir: /app
    command: ["python", "-m", "pytest", "tests", "-q", "--tb=short"]

  teams_tests:
    build:
      context: ./RSK_back/teams_service
      dockerfile: dockerfile
    working_dir: /app
    command: ["python", "-m", "pytest", "tests", "-q", "--tb=short"]

  user_profile_tests:
    build:
      context: ./RSK_back/user_profile
      dockerfile: dockerfile
    working_dir: /app
    command: ["python", "-m", "pytest", "tests", "-q", "--tb=short"]

  frontend_tests:
    build:
      context: ./rsk_fr-main
      dockerfile: Dockerfile.test
    # CMD из Dockerfile.test: npm test
