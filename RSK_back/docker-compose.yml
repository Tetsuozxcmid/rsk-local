services:
  rabbitmq:
    image: rabbitmq:3.12-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    networks:
      - shared_network

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - shared_network

  rsk_auth_app:
    build: ./auth_service
    ports:
      - "8002:8002"
    depends_on:
      rsk_auth_db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: on-failure
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: rsk_auth_db
      DB_PORT: 5432
      DB_USER: ${DB_AUTH_USER}
      DB_PASS: ${DB_AUTH_PASSWORD}
      DB_NAME: ${DB_AUTH_NAME}
      USER_PROFILE_URL: http://rsk_profile_app:8003
      URL_FOR_TOKEN: http://localhost:8002
      SMTP_SERVER: mailhog
      SMTP_PORT: "1025"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
    networks:
      - shared_network

  rsk_auth_db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_AUTH_USER}
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD}
      POSTGRES_DB: ${DB_AUTH_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  rsk_profile_app:
    build: ./user_profile
    depends_on:
      rabbitmq:
        condition: service_healthy
      rsk_profile_db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8003:8003"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: rsk_profile_db
      DB_PORT: 5432
      DB_USER: ${DB_PROFILE_USER}
      DB_PASS: ${DB_PROFILE_PASSWORD}
      DB_NAME: ${DB_PROFILE_NAME}
      ORGS_URL: http://rsk_orgs_app:8005
      AUTH_SERVICE_URL: http://rsk_auth_app:8002
    networks:
      - shared_network

  rsk_profile_db:
    image: postgres:17-alpine
    volumes:
      - profile_postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${DB_PROFILE_USER}
      POSTGRES_PASSWORD: ${DB_PROFILE_PASSWORD}
      POSTGRES_DB: ${DB_PROFILE_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  rsk_teams_app:
    build: ./teams_service
    depends_on:
      rsk_teams_db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8004:8004"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: rsk_teams_db
      DB_PORT: 5432
      DB_USER: ${DB_TEAMS_USER}
      DB_PASS: ${DB_TEAMS_PASSWORD}
      DB_NAME: ${DB_TEAMS_NAME}
      ORGS_URL: http://rsk_orgs_app:8005
      USER_PROFILE_URL: http://rsk_profile_app:8003
      RSK_BOT_URL: http://admin_bot:8009
    networks:
      - shared_network

  rsk_teams_db:
    image: postgres:17-alpine
    volumes:
      - teams_postgres_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${DB_TEAMS_USER}
      POSTGRES_PASSWORD: ${DB_TEAMS_PASSWORD}
      POSTGRES_DB: ${DB_TEAMS_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  rsk_orgs_app:
    build: ./orgs_service
    depends_on:
      rsk_orgs_db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8005:8005"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: rsk_orgs_db
      DB_PORT: 5432
      DB_USER: ${DB_ORGS_USER}
      DB_PASS: ${DB_ORGS_PASSWORD}
      DB_NAME: ${DB_ORGS_NAME}
      USERS_SERVICE_URL: http://rsk_profile_app:8003
      TEAMS_SERVICE_URL: http://rsk_teams_app:8004/teams
    networks:
      - shared_network

  rsk_orgs_db:
    image: postgres:17-alpine
    volumes:
      - orgs_postgres_data:/var/lib/postgresql/data
      - ./orgs_service/initdb:/docker-entrypoint-initdb.d
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: ${DB_ORGS_USER}
      POSTGRES_PASSWORD: ${DB_ORGS_PASSWORD}
      POSTGRES_DB: ${DB_ORGS_NAME}
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  admin_bot:
    build: ./admin_service
    container_name: admin_bot
    ports:
      - "8009:8009"
    env_file:
      - path: .env
        required: false
    environment:
      RSK_ORGS_URL: http://rsk_orgs_app:8005
    networks:
      - shared_network

  rsk_projects_app:
    build: ./projects_service
    depends_on:
      rsk_projects_db:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8010:8010"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: rsk_projects_db
      DB_PORT: 5432
      DB_USER: ${DB_PROJECTS_USER}
      DB_PASS: ${DB_PROJECTS_PASSWORD}
      DB_NAME: ${DB_PROJECTS_NAME}
      TEAMS_SERVICE_URL: http://rsk_teams_app:8004/teams
      AUTH_SERVICE_URL: http://rsk_auth_app:8002
    networks:
      - shared_network

  rsk_projects_db:
    image: postgres:17-alpine
    volumes:
      - projects_postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: ${DB_PROJECTS_USER}
      POSTGRES_PASSWORD: ${DB_PROJECTS_PASSWORD}
      POSTGRES_DB: ${DB_PROJECTS_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  rsk_learning_app:
    build: ./learning_service
    depends_on:
      rsk_learning_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8011:8011"
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: rsk_learning_db
      DB_PORT: 5432
      DB_USER: ${DB_LEARNING_USER}
      DB_PASS: ${DB_LEARNING_PASSWORD}
      DB_NAME: ${DB_LEARNING_NAME}
      AUTH_SERVICE_URL: http://rsk_auth_app:8002
      PROFILE_SERVICE_URL: http://rsk_profile_app:8003
    networks:
      - shared_network

  rsk_learning_db:
    image: postgres:17-alpine
    volumes:
      - learning_postgres_data:/var/lib/postgresql/data
    ports:
      - "5445:5432"
    environment:
      POSTGRES_USER: ${DB_LEARNING_USER}
      POSTGRES_PASSWORD: ${DB_LEARNING_PASSWORD}
      POSTGRES_DB: ${DB_LEARNING_NAME}
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared_network

  celery_worker:
    build: ./learning_service
    command: celery -A app.services.celery_app worker --loglevel=info -Q learning
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rsk_learning_db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app:/app/app
      DB_HOST: rsk_learning_db
      DB_PORT: 5432
      DB_USER: ${DB_LEARNING_USER}
      DB_PASS: ${DB_LEARNING_PASSWORD}
      DB_NAME: ${DB_LEARNING_NAME}
    volumes:
      - ./learning_service:/app
    networks:
      - shared_network

  celery_beat:
    build: ./learning_service
    command: celery -A app.services.celery_app beat --loglevel=info
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
    env_file:
      - path: .env
        required: false
    environment:
      PYTHONPATH: /app:/app/app
      DB_HOST: rsk_learning_db
      DB_PORT: 5432
      DB_USER: ${DB_LEARNING_USER}
      DB_PASS: ${DB_LEARNING_PASSWORD}
      DB_NAME: ${DB_LEARNING_NAME}
    volumes:
      - ./learning_service:/app
    networks:
      - shared_network

  prometheus:
    profiles:
      - monitoring
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - shared_network

  grafana:
    profiles:
      - monitoring
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - shared_network

  node-exporter:
    profiles:
      - monitoring
    image: prom/node-exporter
    container_name: node-exporter
    networks:
      - shared_network

  redis_exporter:
    profiles:
      - monitoring
    image: oliver006/redis_exporter
    container_name: redis-exporter
    command:
      - "--redis.addr=redis://redis:6379"
    networks:
      - shared_network

  postgres_exporter:
    profiles:
      - monitoring
    image: prometheuscommunity/postgres-exporter
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_AUTH_USER}:${DB_AUTH_PASSWORD}@rsk_auth_db:5432/${DB_AUTH_NAME}?sslmode=disable
    networks:
      - shared_network

  nextjs:
    build:
      context: ../rsk_fr-main
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ROUTING: direct
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_API_ROUTING: direct
      NEXT_PUBLIC_API_ROUTING: direct
      BACKEND_DIRECT_AUTH_URL: http://rsk_auth_app:8002
      BACKEND_DIRECT_USERS_URL: http://rsk_profile_app:8003
      BACKEND_DIRECT_TEAMS_URL: http://rsk_teams_app:8004
      BACKEND_DIRECT_ORGS_URL: http://rsk_orgs_app:8005
      BACKEND_DIRECT_ADMIN_URL: http://admin_bot:8009
      BACKEND_DIRECT_PROJECTS_URL: http://rsk_projects_app:8010
      BACKEND_DIRECT_LEARNING_URL: http://rsk_learning_app:8011
      LOGOUT_COOKIE_DOMAIN: ${LOGOUT_COOKIE_DOMAIN:-}
      LOGOUT_COOKIE_SECURE: ${LOGOUT_COOKIE_SECURE:-false}
    depends_on:
      - rsk_auth_app
      - rsk_profile_app
    networks:
      - shared_network

volumes:
  redis_data:
  auth_postgres_data:
  profile_postgres_data:
  teams_postgres_data:
  orgs_postgres_data:
  projects_postgres_data:
  learning_postgres_data:

networks:
  shared_network:
    driver: bridge
